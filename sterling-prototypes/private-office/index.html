<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Private Office - Wealth Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #4c1d95 0%, #6b21a8 100%); color: #fff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #e9d5ff; margin-bottom: 40px; font-size: 1.1em; }
        
        .input-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px; margin-bottom: 30px; }
        .input-section h2 { margin-bottom: 20px; font-size: 1.3em; }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; font-size: 1em; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        
        button { background: #a855f7; color: white; padding: 14px 28px; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 600; transition: background 0.3s; }
        button:hover { background: #9333ea; }
        
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .wealth-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
        .wealth-title { font-size: 1.1em; font-weight: 600; margin-bottom: 10px; color: #e9d5ff; }
        .wealth-value { font-size: 1.8em; font-weight: 700; color: #d8b4fe; margin: 10px 0; }
        .wealth-description { color: #d1d5db; font-size: 0.9em; line-height: 1.5; }
        
        .portfolio-breakdown { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-top: 20px; }
        .portfolio-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .portfolio-item:last-child { border-bottom: none; }
        .portfolio-label { color: #d1d5db; }
        .portfolio-value { color: #d8b4fe; font-weight: 600; }
        
        .recommendation { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.3); border-radius: 12px; padding: 20px; margin-top: 20px; }
        .recommendation h3 { margin-bottom: 15px; color: #e9d5ff; }
        .recommendation-text { color: #d1d5db; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sterling Private Office</h1>
        <p class="subtitle">Bespoke Wealth Management & Family Office Services</p>
        
        <div class="input-section">
            <h2>Wealth Profile</h2>
            <input type="text" id="clientName" placeholder="Client/Family Name" />
            <input type="number" id="totalWealth" placeholder="Total Liquid Assets (£)" />
            <select id="wealthType">
                <option value="">Primary Wealth Source</option>
                <option value="business">Business/Entrepreneurship</option>
                <option value="inheritance">Inheritance/Family Office</option>
                <option value="professional">Professional Services</option>
                <option value="investment">Investment/Finance</option>
            </select>
            <button onclick="runWealthAnalysis()">Analyze Wealth Profile</button>
        </div>
        
        <div id="results" class="results" style="display: none;"></div>
        <div id="portfolio" class="portfolio-breakdown" style="display: none;"></div>
        <div id="recommendation" class="recommendation" style="display: none;"></div>
    </div>
    
    <script>
        function runWealthAnalysis() {
            const client = document.getElementById('clientName').value;
            const wealth = parseInt(document.getElementById('totalWealth').value);
            const source = document.getElementById('wealthType').value;
            
            if (!client || !wealth || !source) {
                alert('Please fill in all fields');
                return;
            }
            
            const analysis = analyzeWealth(wealth, source);
            displayResults(analysis, client);
        }
        
        function analyzeWealth(wealth, source) {
            const taxOptimization = wealth * 0.12; // Potential tax savings
            const estatePlanning = wealth * 0.05; // Estate planning benefit
            const investmentOpportunity = wealth * 0.15; // Additional return potential
            
            const portfolio = {
                equities: wealth * 0.35,
                fixedIncome: wealth * 0.25,
                alternatives: wealth * 0.20,
                realEstate: wealth * 0.15,
                cash: wealth * 0.05
            };
            
            return {
                totalWealth: wealth,
                taxOptimization: taxOptimization,
                estatePlanning: estatePlanning,
                investmentOpportunity: investmentOpportunity,
                portfolio: portfolio,
                annualFee: Math.max(5000, wealth * 0.005) // 0.5% annual fee
            };
        }
        
        function displayResults(analysis, client) {
            const resultsDiv = document.getElementById('results');
            const portfolioDiv = document.getElementById('portfolio');
            const recommendationDiv = document.getElementById('recommendation');
            
            resultsDiv.innerHTML = `
                <div class="wealth-card">
                    <div class="wealth-title">Total Managed Assets</div>
                    <div class="wealth-value">£${(analysis.totalWealth / 1000000).toFixed(1)}M</div>
                    <div class="wealth-description">Client: ${client}</div>
                </div>
                
                <div class="wealth-card">
                    <div class="wealth-title">Tax Optimization Potential</div>
                    <div class="wealth-value">£${(analysis.taxOptimization / 1000).toFixed(0)}k</div>
                    <div class="wealth-description">Annual tax savings opportunity</div>
                </div>
                
                <div class="wealth-card">
                    <div class="wealth-title">Estate Planning Value</div>
                    <div class="wealth-value">£${(analysis.estatePlanning / 1000).toFixed(0)}k</div>
                    <div class="wealth-description">Wealth transfer optimization</div>
                </div>
                
                <div class="wealth-card">
                    <div class="wealth-title">Investment Opportunity</div>
                    <div class="wealth-value">£${(analysis.investmentOpportunity / 1000).toFixed(0)}k</div>
                    <div class="wealth-description">Additional annual return potential</div>
                </div>
            `;
            
            portfolioDiv.innerHTML = `
                <h3 style="margin-bottom: 15px;">Recommended Portfolio Allocation</h3>
                <div class="portfolio-item">
                    <span class="portfolio-label">Equities</span>
                    <span class="portfolio-value">£${(analysis.portfolio.equities / 1000).toFixed(0)}k (35%)</span>
                </div>
                <div class="portfolio-item">
                    <span class="portfolio-label">Fixed Income</span>
                    <span class="portfolio-value">£${(analysis.portfolio.fixedIncome / 1000).toFixed(0)}k (25%)</span>
                </div>
                <div class="portfolio-item">
                    <span class="portfolio-label">Alternative Investments</span>
                    <span class="portfolio-value">£${(analysis.portfolio.alternatives / 1000).toFixed(0)}k (20%)</span>
                </div>
                <div class="portfolio-item">
                    <span class="portfolio-label">Real Estate</span>
                    <span class="portfolio-value">£${(analysis.portfolio.realEstate / 1000).toFixed(0)}k (15%)</span>
                </div>
                <div class="portfolio-item">
                    <span class="portfolio-label">Cash Reserve</span>
                    <span class="portfolio-value">£${(analysis.portfolio.cash / 1000).toFixed(0)}k (5%)</span>
                </div>
            `;
            
            recommendationDiv.innerHTML = `
                <h3>Comprehensive Wealth Management Plan</h3>
                <div class="recommendation-text">
                    <p><strong>Services Included:</strong> Portfolio management, tax optimization, estate planning, investment advisory, and family governance.</p>
                    <p style="margin-top: 10px;"><strong>Annual Investment:</strong> £${(analysis.annualFee / 1000).toFixed(0)}k (0.5% AUM)</p>
                    <p style="margin-top: 10px;"><strong>Expected Value Creation:</strong> £${((analysis.taxOptimization + analysis.estatePlanning + analysis.investmentOpportunity) / 1000).toFixed(0)}k annually</p>
                    <p style="margin-top: 10px;"><strong>ROI:</strong> ${(((analysis.taxOptimization + analysis.estatePlanning + analysis.investmentOpportunity) / analysis.annualFee) * 100).toFixed(0)}%</p>
                    <p style="margin-top: 10px;"><strong>Next Step:</strong> Schedule private consultation to discuss bespoke family office structure.</p>
                </div>
            `;
            
            resultsDiv.style.display = 'grid';
            portfolioDiv.style.display = 'block';
            recommendationDiv.style.display = 'block';
        }
    </script>
</body>
</html>
