<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Trade Growth Studio - Export Strategy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #064e3b 0%, #047857 100%); color: #fff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #a7f3d0; margin-bottom: 40px; font-size: 1.1em; }
        
        .input-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px; margin-bottom: 30px; }
        .input-section h2 { margin-bottom: 20px; font-size: 1.3em; }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; font-size: 1em; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        
        button { background: #059669; color: white; padding: 14px 28px; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 600; transition: background 0.3s; }
        button:hover { background: #047857; }
        
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .growth-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
        .growth-title { font-size: 1.1em; font-weight: 600; margin-bottom: 10px; color: #a7f3d0; }
        .growth-value { font-size: 1.8em; font-weight: 700; color: #6ee7b7; margin: 10px 0; }
        .growth-description { color: #d1d5db; font-size: 0.9em; line-height: 1.5; }
        
        .market-list { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-top: 20px; }
        .market-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; margin: 10px 0; border-left: 4px solid #10b981; }
        .market-name { font-weight: 600; margin-bottom: 5px; }
        .market-potential { color: #a7f3d0; font-size: 0.95em; }
        
        .strategy { background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.3); border-radius: 12px; padding: 20px; margin-top: 20px; }
        .strategy h3 { margin-bottom: 15px; color: #a7f3d0; }
        .strategy-text { color: #d1d5db; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sterling Trade Growth Studio</h1>
        <p class="subtitle">Export Strategy & International Market Expansion</p>
        
        <div class="input-section">
            <h2>Business Assessment</h2>
            <input type="text" id="businessName" placeholder="Business Name" />
            <input type="number" id="currentRevenue" placeholder="Current Annual Revenue (£)" />
            <select id="sector">
                <option value="">Select Sector</option>
                <option value="manufacturing">Manufacturing</option>
                <option value="services">Professional Services</option>
                <option value="technology">Technology</option>
                <option value="consumer">Consumer Goods</option>
                <option value="agriculture">Agriculture</option>
            </select>
            <button onclick="runGrowthAnalysis()">Analyze Export Potential</button>
        </div>
        
        <div id="results" class="results" style="display: none;"></div>
        <div id="markets" class="market-list" style="display: none;"></div>
        <div id="strategy" class="strategy" style="display: none;"></div>
    </div>
    
    <script>
        function runGrowthAnalysis() {
            const business = document.getElementById('businessName').value;
            const revenue = parseInt(document.getElementById('currentRevenue').value);
            const sector = document.getElementById('sector').value;
            
            if (!business || !revenue || !sector) {
                alert('Please fill in all fields');
                return;
            }
            
            const analysis = analyzeExportPotential(revenue, sector);
            displayResults(analysis, business);
        }
        
        function analyzeExportPotential(revenue, sector) {
            const exportPotential = revenue * 0.35; // 35% of current revenue
            const newMarkets = Math.floor(Math.random() * 5 + 3); // 3-8 markets
            const timeToMarket = Math.floor(Math.random() * 8 + 4); // 4-12 months
            
            const targetMarkets = [
                { name: 'European Union', potential: exportPotential * 0.35, risk: 'LOW' },
                { name: 'Asia-Pacific', potential: exportPotential * 0.30, risk: 'MEDIUM' },
                { name: 'North America', potential: exportPotential * 0.20, risk: 'MEDIUM' },
                { name: 'Middle East', potential: exportPotential * 0.10, risk: 'HIGH' },
                { name: 'Africa', potential: exportPotential * 0.05, risk: 'HIGH' }
            ];
            
            return {
                currentRevenue: revenue,
                exportPotential: exportPotential,
                newMarkets: newMarkets,
                timeToMarket: timeToMarket,
                investmentRequired: exportPotential * 0.15,
                targetMarkets: targetMarkets,
                projectedGrowth: (exportPotential / revenue * 100).toFixed(1)
            };
        }
        
        function displayResults(analysis, business) {
            const resultsDiv = document.getElementById('results');
            const marketsDiv = document.getElementById('markets');
            const strategyDiv = document.getElementById('strategy');
            
            resultsDiv.innerHTML = `
                <div class="growth-card">
                    <div class="growth-title">Current Revenue</div>
                    <div class="growth-value">£${(analysis.currentRevenue / 1000000).toFixed(1)}M</div>
                    <div class="growth-description">Baseline for growth analysis</div>
                </div>
                
                <div class="growth-card">
                    <div class="growth-title">Export Revenue Potential</div>
                    <div class="growth-value">£${(analysis.exportPotential / 1000000).toFixed(1)}M</div>
                    <div class="growth-description">${analysis.projectedGrowth}% revenue increase</div>
                </div>
                
                <div class="growth-card">
                    <div class="growth-title">Target Markets Identified</div>
                    <div class="growth-value">${analysis.newMarkets}</div>
                    <div class="growth-description">High-opportunity regions</div>
                </div>
                
                <div class="growth-card">
                    <div class="growth-title">Time to Market</div>
                    <div class="growth-value">${analysis.timeToMarket} months</div>
                    <div class="growth-description">Full implementation timeline</div>
                </div>
            `;
            
            let marketsHtml = '<h3 style="margin-bottom: 15px;">Target Market Breakdown</h3>';
            analysis.targetMarkets.forEach(market => {
                marketsHtml += `
                    <div class="market-item">
                        <div class="market-name">${market.name}</div>
                        <div class="market-potential">Revenue Potential: £${(market.potential / 1000000).toFixed(2)}M | Risk: ${market.risk}</div>
                    </div>
                `;
            });
            marketsDiv.innerHTML = marketsHtml;
            
            strategyDiv.innerHTML = `
                <h3>International Growth Strategy</h3>
                <div class="strategy-text">
                    <p><strong>Phase 1 (Months 1-3):</strong> Market research, regulatory compliance, and partner identification in top 3 markets.</p>
                    <p style="margin-top: 10px;"><strong>Phase 2 (Months 4-8):</strong> Localization, distribution setup, and soft launch in primary markets.</p>
                    <p style="margin-top: 10px;"><strong>Phase 3 (Months 9-12):</strong> Full market entry, marketing campaign, and performance optimization.</p>
                    <p style="margin-top: 10px;"><strong>Investment Required:</strong> £${(analysis.investmentRequired / 1000).toFixed(0)}k for market entry and localization.</p>
                    <p style="margin-top: 10px;"><strong>Expected ROI:</strong> 180-240% within 24 months of full market entry.</p>
                    <p style="margin-top: 10px;"><strong>Next Step:</strong> Detailed market feasibility study and go-to-market strategy development.</p>
                </div>
            `;
            
            resultsDiv.style.display = 'grid';
            marketsDiv.style.display = 'block';
            strategyDiv.style.display = 'block';
        }
    </script>
</body>
</html>
